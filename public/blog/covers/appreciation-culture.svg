<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1C33"/>
      <stop offset="60%" style="stop-color:#0d2018"/>
      <stop offset="100%" style="stop-color:#1a2b4a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8F5E"/>
      <stop offset="100%" style="stop-color:#FF6B2C"/>
    </linearGradient>
    <linearGradient id="treeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="gblur">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="400" rx="380" ry="320" fill="#22C55E" filter="url(#gblur)" opacity="0.12"/>
  <ellipse cx="900" cy="200" rx="300" ry="250" fill="#FF6B2C" filter="url(#gblur)" opacity="0.1"/>
  <ellipse cx="700" cy="550" rx="250" ry="180" fill="#3B82F6" filter="url(#gblur)" opacity="0.1"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="white" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Tree trunk (appreciation tree) -->
  <rect x="380" y="400" width="40" height="120" rx="8" fill="rgba(34,197,94,0.25)"/>
  <!-- Branches -->
  <line x1="400" y1="440" x2="300" y2="340" stroke="rgba(52,211,153,0.35)" stroke-width="8" stroke-linecap="round"/>
  <line x1="400" y1="400" x2="500" y2="320" stroke="rgba(52,211,153,0.35)" stroke-width="8" stroke-linecap="round"/>
  <line x1="400" y1="460" x2="260" y2="400" stroke="rgba(52,211,153,0.25)" stroke-width="6" stroke-linecap="round"/>
  <line x1="400" y1="450" x2="540" y2="390" stroke="rgba(52,211,153,0.25)" stroke-width="6" stroke-linecap="round"/>

  <!-- Tree crown circles -->
  <circle cx="400" cy="280" r="90" fill="url(#treeGrad)" opacity="0.55"/>
  <circle cx="310" cy="320" r="60" fill="url(#treeGrad)" opacity="0.45"/>
  <circle cx="490" cy="300" r="65" fill="url(#treeGrad)" opacity="0.45"/>
  <circle cx="370" cy="230" r="50" fill="url(#treeGrad)" opacity="0.5"/>
  <circle cx="440" cy="240" r="45" fill="url(#treeGrad)" opacity="0.45"/>
  <circle cx="280" cy="370" r="40" fill="url(#treeGrad)" opacity="0.35"/>
  <circle cx="520" cy="360" r="40" fill="url(#treeGrad)" opacity="0.35"/>

  <!-- People silhouettes on branches -->
  <!-- Person 1 -->
  <circle cx="300" cy="325" r="12" fill="rgba(255,255,255,0.7)"/>
  <path d="M290 340 Q300 345 310 340" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none"/>

  <!-- Person 2 -->
  <circle cx="500" cy="305" r="12" fill="rgba(255,255,255,0.7)"/>
  <path d="M490 320 Q500 325 510 320" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none"/>

  <!-- Person 3 -->
  <circle cx="400" cy="185" r="12" fill="rgba(255,255,255,0.8)"/>

  <!-- Floating appreciation icons -->
  <g transform="translate(180, 140)">
    <circle cx="24" cy="24" r="24" fill="rgba(255,107,44,0.15)" stroke="rgba(255,107,44,0.3)" stroke-width="1.5"/>
    <text x="24" y="32" text-anchor="middle" font-size="22" font-family="system-ui">⭐</text>
  </g>
  <g transform="translate(550, 180)">
    <circle cx="22" cy="22" r="22" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.3)" stroke-width="1.5"/>
    <text x="22" y="30" text-anchor="middle" font-size="20" font-family="system-ui">💚</text>
  </g>
  <g transform="translate(220, 420)">
    <circle cx="20" cy="20" r="20" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1.5"/>
    <text x="20" y="28" text-anchor="middle" font-size="18" font-family="system-ui">🏆</text>
  </g>
  <g transform="translate(490, 440)">
    <circle cx="20" cy="20" r="20" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.3)" stroke-width="1.5"/>
    <text x="20" y="28" text-anchor="middle" font-size="18" font-family="system-ui">🎯</text>
  </g>

  <!-- Right side: stat cards -->
  <g transform="translate(700, 80)" filter="url(#shadow)">
    <!-- Main recognition card -->
    <rect x="0" y="0" width="360" height="130" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="0" y="0" width="360" height="1" fill="rgba(255,255,255,0.2)"/>

    <text x="24" y="32" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.08em">RECOGNITION THIS WEEK</text>

    <!-- Mini user rows -->
    <circle cx="44" cy="68" r="16" fill="#FF6B2C" opacity="0.9"/>
    <text x="44" y="74" text-anchor="middle" font-family="system-ui" font-size="12" fill="white" font-weight="700">J</text>
    <text x="68" y="64" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600">Jamie recognised Alex</text>
    <text x="68" y="80" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)">"Incredible leadership in Q2 sprint"</text>
    <rect x="300" y="56" width="44" height="24" rx="12" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
    <text x="322" y="72" text-anchor="middle" font-family="system-ui" font-size="11" fill="#34D399" font-weight="600">⭐ 5</text>

    <line x1="24" y1="96" x2="336" y2="96" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

    <circle cx="44" cy="116" r="16" fill="#3B82F6" opacity="0.9"/>
    <text x="44" y="122" text-anchor="middle" font-family="system-ui" font-size="12" fill="white" font-weight="700">P</text>
    <text x="68" y="112" font-family="system-ui" font-size="12" fill="rgba(255,255,255,0.9)" font-weight="600">Priya recognised Sam</text>
    <text x="68" y="128" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)">"Always there for the team 💚"</text>
  </g>

  <!-- Stat pills row -->
  <g transform="translate(700, 240)">
    <rect x="0" y="0" width="170" height="80" rx="14" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
    <text x="20" y="26" font-family="system-ui" font-size="10" fill="rgba(52,211,153,0.6)" letter-spacing="0.06em">ENGAGEMENT</text>
    <text x="20" y="58" font-family="system-ui" font-size="34" fill="#34D399" font-weight="800">+14%</text>
  </g>
  <g transform="translate(890, 240)">
    <rect x="0" y="0" width="170" height="80" rx="14" fill="rgba(255,107,44,0.1)" stroke="rgba(255,107,44,0.2)" stroke-width="1"/>
    <text x="20" y="26" font-family="system-ui" font-size="10" fill="rgba(255,143,94,0.6)" letter-spacing="0.06em">RETENTION</text>
    <text x="20" y="58" font-family="system-ui" font-size="34" fill="#FF8F5E" font-weight="800">+31%</text>
  </g>

  <!-- Culture bar chart -->
  <g transform="translate(700, 350)">
    <rect x="0" y="0" width="360" height="160" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="28" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="0.06em">CULTURE PILLARS</text>

    <!-- Bar 1: Recognition -->
    <text x="20" y="56" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.6)">Recognition</text>
    <rect x="120" y="44" width="180" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
    <rect x="120" y="44" width="162" height="14" rx="7" fill="url(#orange)" opacity="0.85"/>
    <text x="308" y="56" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">90%</text>

    <!-- Bar 2: Belonging -->
    <text x="20" y="88" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.6)">Belonging</text>
    <rect x="120" y="76" width="180" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
    <rect x="120" y="76" width="144" height="14" rx="7" fill="url(#green)" opacity="0.85"/>
    <text x="270" y="88" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">80%</text>

    <!-- Bar 3: Growth -->
    <text x="20" y="120" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.6)">Growth</text>
    <rect x="120" y="108" width="180" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
    <rect x="120" y="108" width="126" height="14" rx="7" fill="#A78BFA" opacity="0.8"/>
    <text x="252" y="120" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">70%</text>

    <!-- Bar 4: Trust -->
    <text x="20" y="152" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.6)">Trust</text>
    <rect x="120" y="140" width="180" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
    <rect x="120" y="140" width="153" height="14" rx="7" fill="#FBBF24" opacity="0.8"/>
    <text x="279" y="152" font-family="system-ui" font-size="11" fill="rgba(255,255,255,0.5)">85%</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(0,0,0,0.25)"/>
  <text x="60" y="603" font-family="system-ui" font-size="15" fill="rgba(255,255,255,0.4)">WorkKudo · Recognition for Modern Teams</text>
  <text x="1140" y="603" text-anchor="end" font-family="system-ui" font-size="13" fill="rgba(255,255,255,0.3)">workkudo.com</text>
</svg>
